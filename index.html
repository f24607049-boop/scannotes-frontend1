<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>ScanMyNotes - Free Online Handwriting to Text Converter & OCR</title>
    <meta name="title" content="ScanMyNotes - Free Online Handwriting to Text Converter & OCR" />
    <meta name="description" content="Convert handwritten notes, photos, and PDFs into clean, structured typed text. Fully supports multiple cursive and printed writing styles for students and educators." />
    <meta name="keywords" content="handwriting to text converter, convert handwritten notes to text, handwriting OCR, scan handwritten notes online free, PDF to text, photo notes OCR" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ScanMyNotes Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scanmynotes.study" />
    <meta property="og:title" content="ScanMyNotes - Free Online Handwriting to Text Converter" />
    <meta property="og:description" content="Instantly convert photo notes and PDFs to typed text. Clean structured output, study glossary, and interactive flashcards." />
    <meta property="og:image" content="https://scanmynotes.study/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://scanmynotes.study" />
    <meta property="twitter:title" content="ScanMyNotes - Convert Handwriting to Text Free" />
    <meta property="twitter:description" content="Quickly convert physical notes into digital text. Ideal for student class study preparation." />
    <meta property="twitter:image" content="https://scanmynotes.study/og-image.png" />

    <!-- Favicon and Theme Color -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <meta name="theme-color" content="#1F2C4C" />

    <!-- JSON-LD WebApplication and FAQPage Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ScanMyNotes",
      "alternateName": "Scan My Notes OCR",
      "description": "A free web tool that converts handwritten notes (photos or PDFs) into clean, structured typed text supporting multiple cursive and printed styles.",
      "applicationCategory": "EducationalApplication, BusinessApplication",
      "operatingSystem": "All",
      "browserRequirements": "Requires JavaScript. Requires HTML5.",
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I convert handwritten notes to text on ScanMyNotes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Simply upload a photo or PDF of your handwritten note in the upload box, click 'Convert', and our OCR engine will generate structured, clean digital text in seconds. You can then download it as plain text, MS Word, or a polished PDF."
          }
        },
        {
          "@type": "Question",
          "name": "Does ScanMyNotes support different handwriting styles?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! ScanMyNotes is specifically tailored for students and educators. It has state-of-the-art support for cursives, scribbles, standard block letters, list notations, and formulas, instantly formatting them into beautiful readable Markdown documents."
          }
        },
        {
          "@type": "Question",
          "name": "Can I combine multiple pages into a single PDF session?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely! You can scan pages one by one to accumulate them in your active session. Once you are done, click 'Finish & Download PDF' to merge all processed pages into a single polished digital booklet complete with checked stamps."
          }
        }
      ]
    }
    </script>
  </head>
  <body class="bg-paper text-ink-navy min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
